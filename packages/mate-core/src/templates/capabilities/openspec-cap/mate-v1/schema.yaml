name: mate-v1
version: 3
description: Mate's repository- and Area-scoped OpenSpec workflow - explore → proposal → specs → design → tasks
artifacts:
  - id: explore
    generates: explore-brief.md
    description: Concise exploration brief that resolves high-leverage scope questions before proposal work
    template: explore-brief.md
    instruction: |
      Create a concise exploration brief before starting proposal work for a non-trivial change.

      The brief MUST contain exactly these sections:
      - **Problem**: State the problem or opportunity.
      - **Current State**: Summarize the relevant repository, Area, behavior, and constraints.
      - **Questions**: Record only unanswered, high-leverage questions and their answers.
      - **Direction**: State the agreed scope and intended direction.

      Ask questions in one batch and do not repeat answers already present in the conversation or repository context.
      Use an adaptive question budget: target roughly 3 questions for low-complexity changes, 5 for medium-complexity changes, and up to 10 only for high-risk or ambiguous changes. Stop early when the scope is sufficiently clear.
      Keep the brief concise and resolve scope, repository, Area, and acceptance decisions before proposal work.

      **Obsidian**: Emit YAML frontmatter at the very top with `type: change-exploration`, the actual change name, `schema: mate-v1`, the `openspec/change` and `openspec/explore` tags, and paired `scopes` metadata.
    requires: []
  - id: proposal
    generates: proposal.md
    description: Initial proposal document outlining the change
    template: proposal.md
    instruction: |
      Create the proposal document that establishes WHY this change is needed.

      Sections:
      - **Why**: 1-2 sentences on the problem or opportunity. What problem does this solve? Why now?
      - **What Changes**: Bullet list of changes. Be specific about new capabilities, modifications, or removals. Mark breaking changes with **BREAKING**.
      - **Capabilities**: Identify which specs will be created or modified:
         - **New Capabilities**: List capabilities being introduced. Each becomes a new `specs/<capability>/spec.md` using a kebab-case capability name (e.g., `user-auth`, `data-export`). Never place specs under an Area folder. Record the paired scope as `scopes` metadata.
        - **Modified Capabilities**: List existing capabilities whose REQUIREMENTS are changing. Only include if spec-level behavior changes (not just implementation details). Each needs a delta spec file. Check `openspec/specs/` for existing spec names. Leave empty if no requirement changes.
      - **Impact**: Affected code, APIs, dependencies, or systems.

      IMPORTANT: The Capabilities section is critical. It creates the contract between proposal and specs phases. Research existing specs before filling this in. Each capability listed here will need a corresponding spec file.

      Keep it concise (1-2 pages). Focus on the "why" not the "how" - implementation details belong in design.md.

      This is the foundation - specs, design, and tasks all build on this.

       Scope rules:
       - Scopes are recorded ONLY in the frontmatter `scopes` list — do not add a `## Scopes` body section. Every change MUST name at least one scope.
       - Every `scopes` entry MUST pair `repository: org/repository` with an `area` selected according to the repository layout: the owning workspace/package root in a monorepo (for example, `acme`, not `acme/src/sub-1/sub-2`), or the exact affected path in a non-monorepo repository (for example, `docs`); use `.` only when the repository root itself is affected.
       - Repository identity MUST come from the Git remote. Normalize SSH and HTTPS forms such as `git@github.com:org/repository.git` and `https://github.com/org/repository.git` to `org/repository`.
       - Area identity is metadata, never part of a change or capability folder name.
       - Do not use a local checkout directory basename, Mate's internal repository ID, a synthetic Area token, or `N/A` as durable metadata.

      **Obsidian**: Emit this YAML frontmatter at the very top of the file. Replace `<change-name>` with the actual change folder name (e.g. `my-change`):

      ```
      ---
      type: change-proposal
      change: <change-name>
      schema: mate-v1
      status: active
      tags: [openspec/change, openspec/proposal]
      scopes:
        - repository: org/repository
          area: .
      ---
      ```

      At the end of the file, add a `## References` section with `[[wiki-links]]` to each spec listed in the Capabilities section:

      ```
      ## References

      - [[specs/my-capability/spec]]
      ```
    requires:
      - explore
  - id: specs
    generates: specs/**/*.md
    description: Detailed specifications for the change
    template: spec.md
    instruction: |
      Create specification files that define WHAT the system should do.

      Create one spec file per capability listed in the proposal's Capabilities section.

       **Path and scope rules** — spec files are ALWAYS flat; paired scope metadata is required, never a folder:
      - Every spec lives at `specs/<capability>/spec.md`. Never interpose an Area folder. `specs/<area>/<capability>/spec.md` breaks the OpenSpec CLI: it parses spec deltas only at the flat path, so an Area folder makes `openspec show`/`validate` report zero deltas.
       - Every delta and canonical spec MUST record a `scopes` frontmatter list whose entries pair `repository: org/repository` with an `area` selected according to the repository layout. Monorepo Areas stop at workspace/package roots such as `acme` or `packages/ui`; non-monorepo Areas remain exact paths such as `docs` or `.`.
       - Each scope pair is independent. Preserve every repository/Area pair for monorepos and multiple repositories; never use separate parallel `repositories` and `areas` arrays.
       - Example paired scopes: `{ repository: org/product, area: acme }`, `{ repository: org/product, area: packages/api }`, and `{ repository: org/other, area: docs }`.
       - Do not split a monorepo Area into deeper entries such as `acme/src` or `acme/public`; those paths remain inside the `acme` Area. A non-monorepo repository may use exact subpaths such as `docs` to identify the affected Area.
       - Scopes cascade: every requirement inherits all frontmatter `scopes` entries by default and needs no inline markers.
       - Add a direct `**Area:**` marker to a requirement ONLY when its effective scope is narrower than the document scopes. The marker may list multiple Areas as backtick-quoted, comma-separated values (for example, `**Area:** \`acme\`, \`packages/api\``), and every listed Area MUST appear in the frontmatter `scopes`.
       - Add a direct `**Repository:**` marker ONLY when the spec's frontmatter names more than one repository and the requirement binds fewer of them; every listed value MUST appear in the frontmatter `scopes`. In a single-repository spec, requirement-level `**Repository:**` markers are forbidden — the frontmatter already says it.
       - Prefer single-repository specs: a cross-repo feature SHOULD use one capability spec per repository, with shared contracts in a capability owned by one repository. A deliberately multi-repository spec MUST label every requirement that does not bind all listed repositories with a `**Repository:**` marker.
       - Capability names are opaque, kebab-case labels with no scope semantics: repository and Area meaning comes ONLY from the frontmatter `scopes`, never from the capability name. Names are unique per OpenSpec root (`specs/<capability>/spec.md` is flat); when two linked repositories would want the same name, choose distinct descriptive names rather than encoding a repository or Area into the name. State each repository's own observable obligation as its own requirement, and put shared contracts in a capability owned by one repository.
       - Do not use a local checkout directory basename, Mate's internal repository ID, a synthetic Area token, or `N/A`.
      - Modified capabilities: match the existing `specs/<capability>/spec.md` path exactly.

      Delta operations (use ## headers):
      - **ADDED Requirements**: New capabilities
      - **MODIFIED Requirements**: Changed behavior - MUST include full updated content
      - **REMOVED Requirements**: Deprecated features - MUST include **Reason** and **Migration**
      - **RENAMED Requirements**: Name changes only - use FROM:/TO: format

      Format requirements:
      - Each requirement: `### Requirement: <name>` followed by description
      - Use SHALL/MUST for normative requirements (avoid should/may)
       - Narrowing markers, when needed, go after the requirement's SHALL/MUST statement and before its first scenario — `**Repository:**` first, then `**Area:**`. For a REMOVED requirement without a normative statement, put them after `**Migration**`.
      - Each scenario: `#### Scenario: <name>` with WHEN/THEN format
      - **CRITICAL**: Scenarios MUST use exactly 4 hashtags (`####`). Using 3 hashtags or bullets will fail silently.
      - Every requirement MUST have at least one scenario.

      MODIFIED requirements workflow:
      1. Locate the existing requirement in `openspec/specs/<capability>/spec.md`.
      2. Copy the ENTIRE requirement block (from `### Requirement:` through all scenarios)
      3. Paste under `## MODIFIED Requirements` and edit to reflect new behavior
      4. Ensure header text matches exactly (whitespace-insensitive)

      Common pitfall: Using MODIFIED with partial content loses detail at archive time. If adding new concerns without changing existing behavior, use ADDED instead.

      Example (frontmatter scopes cover `acme` and `packages/api`; the first requirement inherits both, the second narrows to one):

      ```
      ## ADDED Requirements

      ### Requirement: User can export data
      The system SHALL allow users to export their data in CSV format.

      #### Scenario: Successful export
      - **WHEN** user clicks "Export" button
      - **THEN** system downloads a CSV file with all user data

      ## REMOVED Requirements

       ### Requirement: Legacy export
       **Reason**: Replaced by new export system
       **Migration**: Use new export endpoint at /api/v2/export
       **Area:** `packages/api`
      ```

      Specs should be testable - each scenario is a potential test case.

       **Obsidian**: Emit this YAML frontmatter at the very top of each spec file. Replace `<change-name>`, `<repository>`, `<area>`, and `<capability>` with actual values. Each `scopes` entry MUST preserve its repository/Area pairing:

      ```
      ---
      type: delta-spec
      change: <change-name>
      capability: <capability>
      tags: [openspec/change, openspec/spec, openspec/delta]
      scopes:
        - repository: org/repository
          area: .
      ---
      ```

      After the file's `#` title line, add a backlink on the next line: `← [[proposal]]`. If modifying an existing main spec, add on the line after: `Applies to: [[openspec/specs/<capability>/spec]]`.

       Migration rules for existing artifacts and canonical specs:
       1. Normalize each Area to the owning workspace/package root for monorepos; for non-monorepos, retain the exact affected repository-relative path and use `.` only when the repository root is the intended Area.
       2. Replace local, internal, synthetic, or otherwise non-portable repository and Area values with canonical Git remote identities and exact repository-relative paths.
       3. Add mandatory paired `scopes` frontmatter to every delta and canonical spec that lacks it.
       4. Remove requirement-level `**Repository:**` markers and any `**Area:**` marker that merely repeats the full document scope; keep or add `**Area:**` markers only where a requirement's effective scope is narrower than the frontmatter `scopes`.
       5. Preserve paired scope metadata and narrowing Area markers when archiving, validating, displaying, or finishing artifacts.
    requires:
      - proposal
  - id: design
    generates: design.md
    description: Technical design document with implementation details
    template: design.md
    instruction: |
      Create the design document that explains HOW to implement the change.

      When to include design.md (create only if any apply):
      - Cross-cutting change (multiple services/modules) or new architectural pattern
      - New external dependency or significant data model changes
      - Security, performance, or migration complexity
      - Ambiguity that benefits from technical decisions before coding

      Sections:
      - **Context**: Background, current state, constraints, stakeholders
      - **Goals / Non-Goals**: What this design achieves and explicitly excludes
      - **Decisions**: Key technical choices with rationale (why X over Y?). Include alternatives considered for each decision.
      - **Risks / Trade-offs**: Known limitations, things that could go wrong. Format: [Risk] → Mitigation
      - **Migration Plan**: Steps to deploy, rollback strategy (if applicable)
      - **Open Questions**: Outstanding decisions or unknowns to resolve

      Focus on architecture and approach, not line-by-line implementation. Reference the proposal for motivation and specs for requirements.

      Good design docs explain the "why" behind technical decisions.

      **Obsidian**: Emit this YAML frontmatter at the very top of the file. Replace `<change-name>` with the actual change folder name:

      ```
      ---
      type: change-design
      change: <change-name>
      schema: mate-v1
      tags: [openspec/change, openspec/design]
      ---
      ```

      After the file's `#` title, add on the next line: `← [[proposal]]`. Reference relevant spec files inline using `[[specs/<capability>/spec]]` where appropriate.
    requires:
      - proposal
  - id: tasks
    generates: tasks.md
    description: Implementation checklist with trackable tasks
    template: tasks.md
    instruction: |
      Create the task list that breaks down the implementation work.

      **IMPORTANT: Follow the template below exactly.** The apply phase parses checkbox format to track progress. Tasks not using `- [ ]` won't be tracked.

      Guidelines:
       - Group tasks by the exact Areas listed in the proposal's `scopes` frontmatter, then by concern within each Area. Use `## <area>` as the top-level heading (for example, `## acme` or `## .`) with numbered sub-sections beneath it.
      - Each task MUST be a checkbox: `- [ ] X.Y Task description`
      - Tasks should be small enough to complete in one session
      - Order tasks by dependency (what must be done first?)

      Example:

      ```
      ## 1. Setup

      - [ ] 1.1 Create new module structure
      - [ ] 1.2 Add dependencies to package.json

      ## 2. Core Implementation

      - [ ] 2.1 Implement data export function
      - [ ] 2.2 Add CSV formatting utilities
      ```

      Reference specs for what needs to be built, design for how to build it. Each task should be verifiable - you know when it's done.

      **Skill tagging**: Tag each task with `[skill:<name>]` at the end of its checkbox line when a skill applies.

      No-tag cases — implement these directly with no skill tag:
      - Config file changes (`vite.config.ts`, `next.config.ts`, etc.)
      - Constant or route definition additions
      - Package exports / index wiring
      - Single-file edits that follow no special convention
      - Rebuilding or compiling packages
      - Running checks / type checks / lint
      - Trivial utility functions co-located in a component or hook

      **Obsidian**: Emit this YAML frontmatter at the very top of the file. Replace `<change-name>` with the actual change folder name:

      ```
      ---
      type: change-tasks
      change: <change-name>
      schema: mate-v1
      tags: [openspec/change, openspec/tasks]
      ---
      ```

      After the file's `#` title, add on the next line: `← [[proposal]] | [[design]]`. At the end of the file, add a `## References` section with `[[wiki-links]]` for each affected spec area:

      ```
      ## References

      - [[specs/my-capability/spec]]
      ```
    requires:
      - specs
      - design
apply:
  requires:
    - tasks
  tracks: tasks.md
  instruction: |
    Read context files and work through pending tasks only within the proposal's affected Areas. Mark complete as you go.
    Pause if you hit blockers or need clarification.
